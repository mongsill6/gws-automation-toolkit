name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats

      - name: ShellCheck — scripts/ and utils/
        run: |
          echo "[CI] shellcheck 실행 중..."
          find scripts/ utils/ -name '*.sh' -type f -print0 \
            | xargs -0 shellcheck -x
          echo "[CI] shellcheck 통과"

      - name: Bats — unit tests
        run: |
          echo "[CI] bats 테스트 실행 중..."
          bats tests/
          echo "[CI] bats 통과"
